{% extends 'base.html' %}
{% block pagetitle %}AI Engine{% endblock %}

{% block body %}

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 style="color:#05380b;">🌿 AI Analyzer</h1>
        <p class="text-muted">Upload leaf image to detect disease</p>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-5">
            <div class="p-4 bg-white shadow rounded-lg text-center">

                <form action="/submit" method="POST" enctype="multipart/form-data">

                    <input type="file" name="image" required class="form-control mb-3">

                    <button class="btn btn-success w-100">
                        Analyze 
                    </button>

                </form>

            </div>
        </div>

    </div>

</div>

{% endblock %}
