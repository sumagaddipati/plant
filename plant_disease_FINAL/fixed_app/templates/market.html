{% extends 'base.html' %}
{% block pagetitle %}Market{% endblock %}

{% block body %}

<div class="container py-5">

    <h1 class="text-center mb-5" style="color:#05380b;">🛒 Supplements</h1>

    <div class="row g-4">

        {% for i in range(0,supplement_name | length) %}
        {% if i != 4 %}

        <div class="col-md-3">
            <div class="bg-white shadow p-3 rounded-lg text-center h-100">

                <img src="{{supplement_image[i]}}" width="150" height="200">

                <h6 class="mt-2">{{supplement_name[i]}}</h6>
                <p class="text-muted">{{disease[i]}}</p>

                <a href="{{buy[i]}" target="_blank">
                    <button class="btn btn-success btn-sm">Buy</button>
                </a>

            </div>
        </div>

        {% endif %}
        {% endfor %}

    </div>

</div>

{% endblock %}
